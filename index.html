<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NFL Head Coach 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #05070a;
        --surface: #0a0e14;
        --border: #1a222e;
        --accent-cyan: #00d1ff;
        --accent-amber: #f59e0b;
        --accent-red: #ef4444;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg);
        color: #e2e8f0;
        margin: 0;
        -webkit-font-smoothing: antialiased;
      }
      .header-font {
        font-family: 'Space Grotesk', sans-serif;
        letter-spacing: -0.02em;
      }
      .mono-font {
        font-family: 'JetBrains Mono', monospace;
      }
      /* Kinetic Operator Elements */
      .grid-lines {
        background-image: 
          linear-gradient(to right, var(--border) 1px, transparent 1px),
          linear-gradient(to bottom, var(--border) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .scan-line {
        background: linear-gradient(to bottom, transparent, rgba(0, 209, 255, 0.05), transparent);
        height: 2px;
        width: 100%;
        position: absolute;
        top: 0;
        left: 0;
        animation: scan 8s linear infinite;
        pointer-events: none;
        z-index: 50;
      }
      @keyframes scan {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100vh); }
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent-cyan);
      }
    </style>
